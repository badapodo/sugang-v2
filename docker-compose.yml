services:
  app:
    build: .
    container_name: sugang-v2-baseline-app
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/enrollment
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      HIKARI_MAXIMUM_POOL_SIZE: 16
      HIKARI_CONNECTION_TIMEOUT_MS: 8000
    cpus: "8.0"
    mem_limit: 32g

  postgres:
    image: postgres:16
    container_name: sugang-v2-baseline-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: enrollment
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: sugang-v2-baseline-postgres-exporter
    depends_on:
      - postgres
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://user:password@postgres:5432/enrollment?sslmode=disable

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: sugang-v2-baseline-prometheus
    depends_on:
      - app
      - postgres-exporter
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.4
    container_name: sugang-v2-baseline-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro

  k6:
    image: grafana/k6:${K6_VERSION:-latest}
    container_name: sugang-v2-baseline-k6
    depends_on:
      - app
    profiles:
      - load
    environment:
      BASE_URL: http://app:8080
      PAYLOAD_PATH: /payload/enrollment_payload.csv
      VUS: ${VUS:-200}
      ITERATIONS: ${ITERATIONS:-}
      LIMIT: ${LIMIT:-}
      SCENARIO_FILTER: ${SCENARIO_FILTER:-}
      IGNORE_SCHEDULE: ${IGNORE_SCHEDULE:-false}
      MAX_DURATION: ${MAX_DURATION:-45s}
    volumes:
      - ./k6:/scripts:ro
      - ./mock/sugang-mock/output/csv:/payload:ro
      - ./output/k6:/results
    command:
      - run
      - --summary-export
      - /results/baseline-summary.json
      - /scripts/baseline-enrollment.js

  k6-prometheus:
    image: grafana/k6:${K6_VERSION:-latest}
    container_name: sugang-v2-baseline-k6-prometheus
    depends_on:
      - app
      - prometheus
    profiles:
      - load-prometheus
    environment:
      BASE_URL: http://app:8080
      PAYLOAD_PATH: /payload/enrollment_payload.csv
      VUS: ${VUS:-200}
      ITERATIONS: ${ITERATIONS:-}
      LIMIT: ${LIMIT:-}
      SCENARIO_FILTER: ${SCENARIO_FILTER:-}
      IGNORE_SCHEDULE: ${IGNORE_SCHEDULE:-false}
      MAX_DURATION: ${MAX_DURATION:-45s}
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
    volumes:
      - ./k6:/scripts:ro
      - ./mock/sugang-mock/output/csv:/payload:ro
      - ./output/k6:/results
    command:
      - run
      - -o
      - experimental-prometheus-rw
      - --summary-export
      - /results/baseline-summary-prometheus.json
      - /scripts/baseline-enrollment.js
